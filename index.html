<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit SK Melekek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 10px; }
        
        /* Butang Pengaktifan Wajib */
        .activation-box { background: #fff3cd; border: 2px solid #ffeeba; padding: 15px; border-radius: 15px; text-align: center; margin-bottom: 15px; }
        
        .tahun-card { background: white; border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .tahun-header { padding: 15px; background: #fff; border-bottom: 1px solid #eee; font-weight: 600; display: flex; justify-content: space-between; }
        
        /* Maklumbalas Visual Murid */
        .murid-item { padding: 15px; transition: all 0.2s ease; border-bottom: 1px solid #f1f1f1; }
        .status-tambah { background-color: #d4edda !important; border-left: 10px solid var(--success); }
        .status-tolak { background-color: #f8d7da !important; border-left: 10px solid var(--danger); }
        
        .btn { padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 600; font-size: 1rem; touch-action: manipulation; }
        .btn-nfc { background: var(--primary); width: 100%; box-shadow: 0 4px 0 #2b44b0; }
        .btn-nfc:active { transform: translateY(4px); box-shadow: none; }
        
        .btn-merit { background: var(--success); flex: 1; }
        .btn-demerit { background: var(--danger); flex: 1; }
        
        .markah-badge { background: var(--dark); color: white; padding: 5px 10px; border-radius: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 2px solid #ddd; border-radius: 10px; font-size: 16px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0">SK MELEKEK</h3>
    <small>Sistem Merit-Demerit</small>
</div>

<div class="activation-box">
    <button class="btn btn-nfc" onpointerdown="mulaSistem()">📲 AKTIFKAN NFC & GETARAN</button>
    <p id="statusTxt" style="font-size: 0.7rem; margin-top: 10px; color: #856404;">Klik butang ini sekali setiap kali buka web.</p>
</div>

<input type="text" id="cari" placeholder="🔍 Cari nama murid..." oninput="nfcFokusUid=''; paparTahun()">

<div id="mainContainer"></div>

<script>
    // Konfigurasi Firebase anda
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let semuaMurid = [];
    let nfcFokusUid = "";

    // 1. Ambil Data
    db.ref('pelajar').on('value', s => {
        const data = s.val();
        semuaMurid = [];
        for(let id in data) { semuaMurid.push({uid:id, ...data[id]}); }
        paparTahun();
    });

    // 2. Fungsi Paparan
    function paparTahun() {
        const container = document.getElementById('mainContainer');
        const cari = document.getElementById('cari').value.toLowerCase().trim();
        container.innerHTML = "";

        for (let t = 1; t <= 6; t++) {
            let senarai = semuaMurid.filter(m => parseInt(m.tahun) === t);
            
            if (nfcFokusUid !== "") {
                senarai = senarai.filter(m => m.uid === nfcFokusUid);
            } else if (cari !== "") {
                senarai = senarai.filter(m => m.nama.toLowerCase().includes(cari));
            }

            if (senarai.length > 0) {
                const card = document.createElement('div');
                card.className = 'tahun-card';
                card.innerHTML = `
                    <div class="tahun-header">TAHUN ${t} <span>${senarai.length} Murid</span></div>
                    <div class="tahun-content">
                        ${senarai.map(m => `
                            <div class="murid-item" id="row-${m.uid}">
                                <div style="display:flex; justify-content:space-between; align-items:center">
                                    <div><b>${m.nama}</b><br><small>${m.uid}</small></div>
                                    <div class="markah-badge">${m.markah}</div>
                                </div>
                                <div style="display:flex; gap:10px; margin-top:12px;">
                                    <button class="btn btn-merit" onpointerdown="kemaskini('${m.uid}', 5)">+5 Merit</button>
                                    <button class="btn btn-demerit" onpointerdown="kemaskini('${m.uid}', -5)">-5 Demerit</button>
                                </div>
                            </div>
                        `).join('')}
                    </div>`;
                container.appendChild(card);
            }
        }
    }

    // 3. Fungsi Utama (Getaran & Warna)
    function kemaskini(uid, nilai) {
        // GETARAN AGRESIF
        if (navigator.vibrate) {
            navigator.vibrate([100, 50, 100]);
        }

        const el = document.getElementById(`row-${uid}`);
        const warnaKelas = nilai > 0 ? 'status-tambah' : 'status-tolak';

        // TUKAR WARNA
        el.classList.add(warnaKelas);
        
        // SIMPAN KE FIREBASE
        db.ref('pelajar/'+uid+'/markah').transaction(c => (c || 0) + nilai);

        // RESET WARNA SELEPAS 1 SAAT
        setTimeout(() => {
            el.classList.remove('status-tambah', 'status-tolak');
        }, 1000);
    }

    // 4. Aktifkan Sistem (Wajib Klik)
    async function mulaSistem() {
        if (navigator.vibrate) navigator.vibrate(100);
        const status = document.getElementById('statusTxt');
        
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                status.innerText = "✅ SISTEM AKTIF & SEDIA IMBAS";
                status.style.color = "green";
                
                ndef.onreading = event => {
                    if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
                    const idScan = event.serialNumber.replace(/:/g, "").toUpperCase();
                    nfcFokusUid = idScan;
                    document.getElementById('cari').value = "";
                    paparTahun();
                };
            } catch (e) { status.innerText = "Ralat: Sila benarkan kebenaran NFC."; }
        } else {
            alert("Sila gunakan Google Chrome pada Android.");
        }
    }
</script>
</body>
</html>
