<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit SK Melekek v12</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; --rmt: #ff9f43; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 15px; }
        
        /* Grid Menu Utama */
        .grid-folder { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-folder { background: white; border: 2.5px solid var(--primary); color: var(--primary); padding: 15px 5px; border-radius: 15px; font-weight: 700; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.05); cursor: pointer; font-size: 0.85rem; }
        .btn-khas { grid-column: span 2; padding: 15px; border-radius: 15px; font-weight: 800; border: none; color: white; margin-top: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tahun-label { grid-column: span 2; font-size: 0.8rem; font-weight: 700; color: #777; margin-top: 10px; border-bottom: 1px solid #ddd; padding-bottom: 2px; }

        /* Pop-up NFC & Overlay */
        #nfcPopup { 
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 85%; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.4);
            z-index: 2000; text-align: center; border: 5px solid var(--primary);
        }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(4px); }

        /* View Transitions */
        #senaraiView, #daftarView, #kehadiranView { display: none; }
        .murid-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1.5px solid #eee; }
        .btn-aksi { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 700; flex: 1; cursor: pointer; }
        .skor-box { font-size: 2.5rem; font-weight: 800; color: var(--dark); margin: 15px 0; background: #f0f2f5; border-radius: 15px; padding: 10px; }

        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">SK MELEKEK</h2>
    <small>Sistem Merit & Pemulihan Data</small>
</div>

<div class="overlay" id="overlay" onclick="tutupPopup()"></div>
<div id="nfcPopup">
    <h3 id="nfcNama" style="margin-bottom:5px; text-transform:uppercase;">NAMA MURID</h3>
    <small id="nfcKelasInfo" style="color:#666; font-weight:600;"></small>
    <div class="skor-box" id="nfcSkor">0</div>
    <div style="display:flex; gap:10px;">
        <button class="btn-aksi" style="background:var(--success)" id="btnNfcTambah">+5 MATA</button>
        <button class="btn-aksi" style="background:var(--danger)" id="btnNfcTolak">-5 MATA</button>
    </div>
    <button onclick="tutupPopup()" style="margin-top:20px; color:var(--primary); font-weight:bold; border:none; background:none; cursor:pointer;">TUTUP</button>
</div>

<div id="menuUtama">
    <button id="btnNFC" class="btn-khas" style="background: var(--dark); margin-bottom: 20px;" onclick="mulaScanNFC()">
        📡 IMBAS KAD (NFC TELEFON)
    </button>

    <div id="alertBadData" style="display:none;">
        <button class="btn-khas" style="background: var(--danger); margin-bottom: 20px;" onclick="pilihKelas('REKOD', 'LAMA')">
            ⚠️ REKOD TIDAK LENGKAP (<span id="badCount">0</span>)
        </button>
    </div>

    <div class="grid-folder">
        <div class="tahun-label">PENGURUSAN KELAS</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'DELIMA')">1 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'ZAMRUD')">1 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'DELIMA')">2 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'ZAMRUD')">2 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'DELIMA')">3 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'ZAMRUD')">3 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'DELIMA')">4 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'ZAMRUD')">4 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'DELIMA')">5 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'ZAMRUD')">5 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'DELIMA')">6 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'ZAMRUD')">6 ZAMRUD</div>
        
        <button class="btn-khas" style="background: var(--success);" onclick="bukaKehadiran()">📅 SEMAK KEHADIRAN</button>
        <button class="btn-khas" style="background: var(--rmt);" onclick="bukaRMT()">🍲 KEHADIRAN RMT</button>
        <button class="btn-khas" style="background: var(--primary);" onclick="bukaPendaftaran()">➕ DAFTAR MURID BARU</button>
    </div>
</div>

<div id="senaraiView">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; background:white; padding:12px; border-radius:12px;">
        <button class="btn-aksi" style="background:var(--dark); max-width:100px;" onclick="kembali()">⬅️ BALIK</button>
        <h3 id="labelKelas" style="margin:0; font-size:1rem;"></h3>
    </div>
    <div id="muridContainer"></div>
</div>

<div id="daftarView">
    <button class="btn-aksi" style="background:var(--dark); margin-bottom:15px;" onclick="kembali()">⬅️ KEMBALI</button>
    <div style="background: white; padding: 20px; border-radius: 15px; border: 2px solid #eee;">
        <h3 id="labelBorang">BORANG MURID</h3>
        <label>ID KAD:</label>
        <input type="text" id="regUid" readonly style="background: #f1f1f1;">
        <label>NAMA MURID:</label>
        <input type="text" id="regNama" placeholder="NAMA PENUH">
        <div style="display:flex; gap:10px;">
            <select id="regTahun">
                <option value="">TAHUN</option>
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
            </select>
            <select id="regNamaKelas">
                <option value="">KELAS</option>
                <option value="DELIMA">DELIMA</option>
                <option value="ZAMRUD">ZAMRUD</option>
            </select>
        </div>
        <button class="btn-aksi" style="background:var(--primary); width:100%;" onclick="simpanMurid()">SIMPAN</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let databaseMurid = [];
    let curTahun = "", curKelas = "";

    // Sync Data & Detect Bad Records
    db.ref('pelajar').on('value', snap => {
        const data = snap.val();
        databaseMurid = [];
        let badCount = 0;
        if(data) { 
            for(let key in data) { 
                let m = {uid: key, ...data[key]};
                databaseMurid.push(m);
                if(!m.tahun || !m.namaKelas) badCount++;
            } 
        }
        
        if(badCount > 0) {
            document.getElementById('alertBadData').style.display = 'block';
            document.getElementById('badCount').innerText = badCount;
        } else {
            document.getElementById('alertBadData').style.display = 'none';
        }

        if(document.getElementById('senaraiView').style.display === 'block') reRender();
    });

    // --- FUNGSI NFC ---
    async function mulaScanNFC() {
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('btnNFC').innerText = "SILA SENTUH KAD...";
                ndef.onreading = event => {
                    const uid = event.serialNumber.replace(/:/g, "").toUpperCase();
                    window.navigator.vibrate(100);
                    prosesNFC(uid);
                };
            } catch (e) { alert("NFC Ralat: " + e); }
        } else { alert("Guna Chrome di Android untuk NFC."); }
    }

    function prosesNFC(uid) {
        const m = databaseMurid.find(x => x.uid === uid);
        if(m) {
            document.getElementById('nfcNama').innerText = m.nama;
            document.getElementById('nfcKelasInfo').innerText = (m.tahun && m.namaKelas) ? `KELAS: ${m.tahun} ${m.namaKelas}` : "⚠️ MAKLUMAT TIDAK LENGKAP";
            document.getElementById('nfcSkor').innerText = m.markah || 0;
            
            document.getElementById('btnNfcTambah').onclick = () => tukarMarkah(uid, 5, true);
            document.getElementById('btnNfcTolak').onclick = () => tukarMarkah(uid, -5, true);
            
            document.getElementById('nfcPopup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        } else {
            bukaPendaftaran();
            document.getElementById('regUid').value = uid;
        }
        document.getElementById('btnNFC').innerText = "📡 IMBAS KAD (NFC TELEFON)";
    }

    // --- UI LOGIK ---
    function pilihKelas(t, k) {
        curTahun = t; curKelas = k;
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('senaraiView').style.display = 'block';
        document.getElementById('labelKelas').innerText = (t === 'REKOD') ? "REKOD TIDAK LENGKAP" : `TAHUN ${t} ${k}`;
        reRender();
    }

    function reRender() {
        const container = document.getElementById('muridContainer');
        container.innerHTML = "";
        let list = (curTahun === 'REKOD') ? 
            databaseMurid.filter(m => !m.tahun || !m.namaKelas) : 
            databaseMurid.filter(m => m.tahun == curTahun && m.namaKelas == curKelas);

        list.sort((a,b) => (b.markah || 0) - (a.markah || 0)).forEach(m => {
            const div = document.createElement('div');
            div.className = 'murid-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <b>${m.nama}</b>
                    <b style="color:var(--primary)">${m.markah || 0}</b>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn-aksi" style="background:var(--success)" onclick="tukarMarkah('${m.uid}', 5)">+5</button>
                    <button class="btn-aksi" style="background:var(--danger)" onclick="tukarMarkah('${m.uid}', -5)">-5</button>
                    <button class="btn-aksi" style="background:var(--dark)" onclick="bukaEdit('${m.uid}')">EDIT</button>
                </div>`;
            container.appendChild(div);
        });
    }

    function tukarMarkah(uid, pts, isNfc = false) {
        db.ref('pelajar/' + uid + '/markah').transaction(cur => {
            const newSkor = (cur || 0) + pts;
            if(isNfc) document.getElementById('nfcSkor').innerText = newSkor;
            return newSkor;
        });
    }

    function simpanMurid() {
        const uid = document.getElementById('regUid').value;
        const nama = document.getElementById('regNama').value.toUpperCase().trim();
        const thn = document.getElementById('regTahun').value;
        const kls = document.getElementById('regNamaKelas').value;

        if(uid && nama && thn && kls) {
            db.ref('pelajar/' + uid).update({ nama: nama, tahun: thn, namaKelas: kls }).then(() => kembali());
        } else {
            alert("Sila isi semua maklumat (Nama, Tahun, Kelas)");
        }
    }

    function bukaEdit(uid) {
        const m = databaseMurid.find(x => x.uid === uid);
        document.querySelectorAll('#menuUtama, #senaraiView').forEach(v => v.style.display = 'none');
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('labelBorang').innerText = "KEMASKINI MURID";
        document.getElementById('regUid').value = m.uid;
        document.getElementById('regNama').value = m.nama;
        document.getElementById('regTahun').value = m.tahun || "";
        document.getElementById('regNamaKelas').value = m.namaKelas || "";
    }

    function bukaPendaftaran() {
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('labelBorang').innerText = "DAFTAR BARU";
        document.getElementById('regUid').value = "";
        document.getElementById('regNama').value = "";
        db.ref('temp_pendaftaran/uid_baru').once('value', s => { if(s.val()) document.getElementById('regUid').value = s.val(); });
    }

    function kembali() {
        document.querySelectorAll('#senaraiView, #daftarView').forEach(v => v.style.display = 'none');
        document.getElementById('menuUtama').style.display = 'block';
    }

    function tutupPopup() {
        document.getElementById('nfcPopup').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>
</body>
</html>
