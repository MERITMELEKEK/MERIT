<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit SK Melekek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 15px; }
        
        /* Menu Folder */
        .grid-folder { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .btn-folder { background: white; border: 3px solid var(--primary); color: var(--primary); padding: 40px 10px; border-radius: 20px; font-weight: 700; font-size: 1.3rem; text-align: center; box-shadow: 0 5px 15px rgba(0,0,0,0.1); cursor: pointer; }
        
        /* Paparan Senarai */
        #senaraiView { display: none; }
        .nav-header { display: flex; align-items: center; gap: 15px; margin-bottom: 20px; background: white; padding: 10px; border-radius: 10px; }
        .btn-back { background: var(--dark); color: white; border: none; padding: 12px 20px; border-radius: 10px; font-weight: 600; }

        .murid-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 2px solid #eee; transition: background-color 0.2s, transform 0.2s; }
        
        /* KESAN WARNA SEKETIKA (FLASH EFFECT) */
        .flash-hijau { 
            background-color: var(--success) !important; 
            color: white !important;
            border-color: #27ae60 !important;
            transform: scale(1.02);
        }
        .flash-merah { 
            background-color: var(--danger) !important; 
            color: white !important;
            border-color: #d63031 !important;
            transform: scale(1.02);
        }

        .btn-aksi { padding: 15px; border: none; border-radius: 10px; color: white; font-weight: 700; flex: 1; font-size: 1rem; touch-action: manipulation; border-bottom: 4px solid rgba(0,0,0,0.2); }
        .markah-badge { background: var(--dark); color: white; padding: 5px 12px; border-radius: 8px; font-weight: 700; }
        
        .btn-nfc-main { background: #f1c40f; color: black; width: 100%; padding: 20px; border-radius: 20px; font-weight: 800; border: none; margin-bottom: 20px; font-size: 1.1rem; box-shadow: 0 5px 0 #d4ac0d; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">SK MELEKEK</h2>
    <small>Ranking Merit-Demerit</small>
</div>

<div id="menuUtama">
    <button class="btn-nfc-main" onclick="mulaNFC()">📲 AKTIFKAN NFC & GETARAN</button>
    <div class="grid-folder">
        <div class="btn-folder" onclick="pilihTahun(1)">TAHUN 1</div>
        <div class="btn-folder" onclick="pilihTahun(2)">TAHUN 2</div>
        <div class="btn-folder" onclick="pilihTahun(3)">TAHUN 3</div>
        <div class="btn-folder" onclick="pilihTahun(4)">TAHUN 4</div>
        <div class="btn-folder" onclick="pilihTahun(5)">TAHUN 5</div>
        <div class="btn-folder" onclick="pilihTahun(6)">TAHUN 6</div>
    </div>
</div>

<div id="senaraiView">
    <div class="nav-header">
        <button class="btn-back" onclick="kembali()">⬅️ KEMBALI</button>
        <h3 id="labelTahun" style="margin:0; color: var(--primary);"></h3>
    </div>
    <input type="text" id="cari" placeholder="🔍 Cari nama murid..." oninput="reRender()">
    <div id="muridContainer"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let databaseMurid = [];
    let tahunDipilih = null;

    db.ref('pelajar').on('value', snap => {
        const data = snap.val();
        databaseMurid = [];
        for(let key in data) { databaseMurid.push({uid: key, ...data[key]}); }
        if(tahunDipilih) reRender();
    });

    function pilihTahun(t) {
        tahunDipilih = t;
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('senaraiView').style.display = 'block';
        document.getElementById('labelTahun').innerText = "TAHUN " + t;
        reRender();
    }

    function kembali() {
        tahunDipilih = null;
        document.getElementById('menuUtama').style.display = 'block';
        document.getElementById('senaraiView').style.display = 'none';
        document.getElementById('cari').value = "";
    }

    function reRender() {
        const container = document.getElementById('muridContainer');
        const carian = document.getElementById('cari').value.toLowerCase();
        container.innerHTML = "";

        // 1. Tapis ikut tahun
        let filtered = databaseMurid.filter(m => parseInt(m.tahun) === tahunDipilih);

        // 2. SUSUN MENGIKUT MARKAH (Tinggi ke Rendah)
        filtered.sort((a, b) => b.markah - a.markah);

        // 3. Tapis ikut carian nama
        if(carian !== "") {
            filtered = filtered.filter(m => m.nama.toLowerCase().includes(carian));
        }

        filtered.forEach(m => {
            const div = document.createElement('div');
            div.className = 'murid-item';
            div.id = `card-${m.uid}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div><b style="font-size:1.1rem">${m.nama}</b><br><small>${m.uid}</small></div>
                    <div class="markah-badge" id="pt-${m.uid}">${m.markah} PT</div>
                </div>
                <div style="display:flex; gap:10px; margin-top:15px;">
                    <button class="btn-aksi" style="background:var(--success)" onpointerdown="aksiMarkah('${m.uid}', 5)">+5 MERIT</button>
                    <button class="btn-aksi" style="background:var(--danger)" onpointerdown="aksiMarkah('${m.uid}', -5)">-5 DEMERIT</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function aksiMarkah(uid, pts) {
        if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

        const el = document.getElementById(`card-${uid}`);
        const kelas = pts > 0 ? 'flash-hijau' : 'flash-merah';
        
        // Tambah warna pada seluruh kotak
        el.classList.add(kelas);
        
        db.ref('pelajar/' + uid + '/markah').transaction(cur => (cur || 0) + pts);

        // Buang warna selepas 600ms (seketika sahaja)
        setTimeout(() => {
            if(el) el.classList.remove(kelas);
        }, 600);
    }

    async function mulaNFC() {
        if (navigator.vibrate) navigator.vibrate(100);
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                alert("NFC & Getaran Sedia!");
                ndef.onreading = event => {
                    const idScan = event.serialNumber.replace(/:/g, "").toUpperCase();
                    const murid = databaseMurid.find(x => x.uid === idScan);
                    if(murid) {
                        pilihTahun(parseInt(murid.tahun));
                        setTimeout(() => {
                            const target = document.getElementById(`card-${idScan}`);
                            if(target) target.scrollIntoView({behavior: "smooth", block: "center"});
                        }, 500);
                    }
                };
            } catch (e) { alert("Aktifkan NFC di tetapan telefon."); }
        }
    }
</script>
</body>
</html>
