<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit & RMT SK Melekek v13</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; --rmt: #ff9f43; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 15px; }
        
        /* Grid Menu Utama */
        .grid-folder { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-folder { background: white; border: 2.5px solid var(--primary); color: var(--primary); padding: 15px 5px; border-radius: 15px; font-weight: 700; text-align: center; box-shadow: 0 3px 6px rgba(0,0,0,0.05); cursor: pointer; font-size: 0.85rem; }
        .btn-khas { grid-column: span 2; padding: 15px; border-radius: 15px; font-weight: 800; border: none; color: white; margin-top: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tahun-label { grid-column: span 2; font-size: 0.8rem; font-weight: 700; color: #777; margin-top: 10px; border-bottom: 1px solid #ddd; padding-bottom: 2px; }

        /* Pop-up NFC */
        #nfcPopup { display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 85%; background: white; padding: 25px; border-radius: 25px; box-shadow: 0 15px 50px rgba(0,0,0,0.4); z-index: 2000; text-align: center; border: 5px solid var(--primary); }
        .overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; backdrop-filter: blur(4px); }

        /* Tables & Lists */
        #senaraiView, #daftarView, #kehadiranView { display: none; }
        .murid-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1.5px solid #eee; }
        .btn-aksi { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 700; flex: 1; cursor: pointer; }
        .skor-box { font-size: 2.5rem; font-weight: 800; color: var(--dark); margin: 15px 0; background: #f0f2f5; border-radius: 15px; padding: 10px; }
        .rmt-tag { background: var(--rmt); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; margin-left: 5px; }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; margin-top: 10px;}
        th { background: #f1f3f9; color: #555; padding: 12px; text-align: left; font-size: 0.7rem; }
        td { padding: 10px 12px; border-bottom: 1px solid #f8f9fa; font-size: 0.8rem; }
        .status-hadir { color: var(--success); font-weight: 800; }
        .status-tidak { color: var(--danger); font-weight: 600; opacity: 0.6; }

        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">SK MELEKEK</h2>
    <small>Merit, Kehadiran & RMT</small>
</div>

<div class="overlay" id="overlay" onclick="tutupPopup()"></div>
<div id="nfcPopup">
    <h3 id="nfcNama" style="margin-bottom:5px; text-transform:uppercase;">...</h3>
    <small id="nfcKelasInfo" style="color:#666; font-weight:600;"></small>
    <div class="skor-box" id="nfcSkor">0</div>
    <div style="display:flex; gap:10px;">
        <button class="btn-aksi" style="background:var(--success)" id="btnNfcTambah">+5 MATA</button>
        <button class="btn-aksi" style="background:var(--danger)" id="btnNfcTolak">-5 MATA</button>
    </div>
    <button onclick="tutupPopup()" style="margin-top:20px; color:var(--primary); font-weight:bold; border:none; background:none; cursor:pointer;">TUTUP</button>
</div>

<div id="menuUtama">
    <button id="btnNFC" class="btn-khas" style="background: var(--dark); margin-bottom: 20px;" onclick="mulaScanNFC()">
        📡 IMBAS KAD (NFC TELEFON)
    </button>

    <div style="margin-bottom: 15px;">
        <input type="text" id="cariUtama" placeholder="🔍 Cari nama murid..." oninput="carianGlobal()">
    </div>

    <div id="alertBadData" style="display:none;">
        <button class="btn-khas" style="background: var(--danger); margin-bottom: 20px;" onclick="pilihKelas('REKOD', 'LAMA')">
            ⚠️ REKOD TIDAK LENGKAP (<span id="badCount">0</span>)
        </button>
    </div>

    <div class="grid-folder">
        <div class="tahun-label">TAHUN 1-6</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'DELIMA')">1D</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'ZAMRUD')">1Z</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'DELIMA')">2D</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'ZAMRUD')">2Z</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'DELIMA')">3D</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'ZAMRUD')">3Z</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'DELIMA')">4D</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'ZAMRUD')">4Z</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'DELIMA')">5D</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'ZAMRUD')">5Z</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'DELIMA')">6D</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'ZAMRUD')">6Z</div>
        
        <button class="btn-khas" style="background: var(--success);" onclick="bukaKehadiran()">📅 SEMAK KEHADIRAN</button>
        <button class="btn-khas" style="background: var(--rmt);" onclick="bukaRMT()">🍲 KEHADIRAN RMT</button>
        <button class="btn-khas" style="background: var(--primary);" onclick="bukaPendaftaran()">➕ DAFTAR MURID BARU</button>
    </div>
</div>

<div id="senaraiView">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px; background:white; padding:12px; border-radius:12px;">
        <button class="btn-aksi" style="background:var(--dark); max-width:80px;" onclick="kembali()">⬅️</button>
        <h3 id="labelKelas" style="margin:0; font-size:1rem;"></h3>
    </div>
    <div id="muridContainer"></div>
</div>

<div id="kehadiranView">
    <div style="display:flex; align-items:center; gap:10px; margin-bottom:15px;">
        <button class="btn-aksi" style="background:var(--dark); max-width:80px;" onclick="kembali()">⬅️</button>
        <h3 id="labelKehadiran" style="margin:0;">KEHADIRAN</h3>
    </div>
    <input type="date" id="tarikhHadir" onchange="prosesKehadiran()">
    <div id="filterHadirContainer">
        <div style="display:flex; gap:10px;">
            <select id="tahunHadir" onchange="prosesKehadiran()">
                <option value="1">Tahun 1</option><option value="2">T2</option><option value="3">T3</option>
                <option value="4">T4</option><option value="5">T5</option><option value="6">T6</option>
            </select>
            <select id="namaKelasHadir" onchange="prosesKehadiran()">
                <option value="DELIMA">DELIMA</option><option value="ZAMRUD">ZAMRUD</option>
            </select>
        </div>
    </div>
    <div id="listKehadiranTable"></div>
</div>

<div id="daftarView">
    <button class="btn-aksi" style="background:var(--dark); margin-bottom:15px;" onclick="kembali()">⬅️ KEMBALI</button>
    <div style="background: white; padding: 20px; border-radius: 15px; border: 2px solid #eee;">
        <h3 id="labelBorang">BORANG MURID</h3>
        <input type="text" id="regUid" readonly style="background: #f1f1f1;" placeholder="ID Kad">
        <input type="text" id="regNama" placeholder="NAMA PENUH">
        <div style="display:flex; gap:10px;">
            <select id="regTahun">
                <option value="">TAHUN</option>
                <option value="1">1</option><option value="2">2</option><option value="3">3</option>
                <option value="4">4</option><option value="5">5</option><option value="6">6</option>
            </select>
            <select id="regNamaKelas">
                <option value="">KELAS</option>
                <option value="DELIMA">DELIMA</option><option value="ZAMRUD">ZAMRUD</option>
            </select>
        </div>
        <div style="background:#fff5e6; padding:10px; border-radius:10px; margin-bottom:12px;">
            <input type="checkbox" id="regRMT" style="width:auto;"> <label for="regRMT" style="font-weight:700; color:var(--rmt)">MURID RMT</label>
        </div>
        <button class="btn-aksi" style="background:var(--primary); width:100%;" onclick="simpanMurid()">SIMPAN</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let databaseMurid = [];
    let curTahun = "", curKelas = "", viewMode = "semua";

    // 1. SYNC DATA
    db.ref('pelajar').on('value', snap => {
        const data = snap.val();
        databaseMurid = [];
        let badCount = 0;
        if(data) { 
            for(let key in data) { 
                let m = {uid: key, ...data[key]};
                databaseMurid.push(m);
                if(!m.tahun || !m.namaKelas) badCount++;
            } 
        }
        document.getElementById('badCount').innerText = badCount;
        document.getElementById('alertBadData').style.display = badCount > 0 ? 'block' : 'none';
        if(document.getElementById('senaraiView').style.display === 'block') reRender();
    });

    // 2. NFC LOGIC
    async function mulaScanNFC() {
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('btnNFC').innerText = "SILA SENTUH KAD...";
                ndef.onreading = event => {
                    const uid = event.serialNumber.replace(/:/g, "").toUpperCase();
                    window.navigator.vibrate(100);
                    prosesNFC(uid);
                };
            } catch (e) { alert("NFC Ralat: " + e); }
        } else { alert("Guna Chrome di Android."); }
    }

    function prosesNFC(uid) {
        const m = databaseMurid.find(x => x.uid === uid);
        if(m) {
            document.getElementById('nfcNama').innerText = m.nama;
            document.getElementById('nfcKelasInfo').innerText = (m.tahun && m.namaKelas) ? `KELAS: ${m.tahun} ${m.namaKelas}` : "⚠️ DATA TIDAK LENGKAP";
            document.getElementById('nfcSkor').innerText = m.markah || 0;
            document.getElementById('btnNfcTambah').onclick = () => tukarMarkah(uid, 5, true);
            document.getElementById('btnNfcTolak').onclick = () => tukarMarkah(uid, -5, true);
            document.getElementById('nfcPopup').style.display = 'block';
            document.getElementById('overlay').style.display = 'block';
        } else {
            bukaPendaftaran();
            document.getElementById('regUid').value = uid;
        }
    }

    // 3. CARIAN GLOBAL
    function carianGlobal() {
        const key = document.getElementById('cariUtama').value.toLowerCase();
        if(key.length > 0) {
            document.getElementById('menuUtama').style.display = 'none';
            document.getElementById('senaraiView').style.display = 'block';
            document.getElementById('labelKelas').innerText = "HASIL CARIAN";
            const res = databaseMurid.filter(m => m.nama.toLowerCase().includes(key));
            displayMurid(res);
        } else { kembali(); }
    }

    // 4. KEHADIRAN & RMT
    async function prosesKehadiran() {
        const tarikh = document.getElementById('tarikhHadir').value;
        if(!tarikh) return;
        const snap = await db.ref('kehadiran/' + tarikh).once('value');
        const senaraiHadir = snap.val() || {};
        let list = [];
        
        if(viewMode === "rmt") {
            list = databaseMurid.filter(m => m.rmt === true).sort((a,b) => a.tahun - b.tahun);
            document.getElementById('labelKehadiran').innerText = "RMT: " + tarikh;
        } else {
            const t = document.getElementById('tahunHadir').value;
            const k = document.getElementById('namaKelasHadir').value;
            list = databaseMurid.filter(m => m.tahun == t && m.namaKelas == k).sort((a,b) => a.nama.localeCompare(b.nama));
            document.getElementById('labelKehadiran').innerText = `HADIR T${t} ${k}`;
        }

        let html = `<table><tr><th>NAMA</th><th>STATUS</th></tr>`;
        list.forEach(m => {
            const status = senaraiHadir[m.uid] ? '<span class="status-hadir">HADIR</span>' : '<span class="status-tidak">TIADA</span>';
            html += `<tr><td><b>${m.nama}</b><br><small>T${m.tahun} ${m.namaKelas || ''}</small></td><td>${status}</td></tr>`;
        });
        document.getElementById('listKehadiranTable').innerHTML = html + `</table>`;
    }

    // 5. RENDER LIST MURID
    function pilihKelas(t, k) {
        curTahun = t; curKelas = k;
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('senaraiView').style.display = 'block';
        document.getElementById('labelKelas').innerText = (t === 'REKOD') ? "REKOD TIDAK LENGKAP" : `KELAS ${t} ${k}`;
        reRender();
    }

    function reRender() {
        let list = (curTahun === 'REKOD') ? 
            databaseMurid.filter(m => !m.tahun || !m.namaKelas) : 
            databaseMurid.filter(m => m.tahun == curTahun && m.namaKelas == curKelas);
        displayMurid(list);
    }

    function displayMurid(list) {
        const container = document.getElementById('muridContainer');
        container.innerHTML = "";
        list.forEach(m => {
            const div = document.createElement('div');
            div.className = 'murid-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between;">
                    <b>${m.nama} ${m.rmt ? '<span class="rmt-tag">RMT</span>' : ''}</b>
                    <b style="color:var(--primary)">${m.markah || 0}</b>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn-aksi" style="background:var(--success)" onclick="tukarMarkah('${m.uid}', 5)">+5</button>
                    <button class="btn-aksi" style="background:var(--danger)" onclick="tukarMarkah('${m.uid}', -5)">-5</button>
                    <button class="btn-aksi" style="background:var(--dark)" onclick="bukaEdit('${m.uid}')">EDIT</button>
                </div>`;
            container.appendChild(div);
        });
    }

    function tukarMarkah(uid, pts, isNfc = false) {
        db.ref('pelajar/' + uid + '/markah').transaction(cur => {
            const n = (cur || 0) + pts;
            if(isNfc) document.getElementById('nfcSkor').innerText = n;
            return n;
        });
    }

    function simpanMurid() {
        const uid = document.getElementById('regUid').value;
        const nama = document.getElementById('regNama').value.toUpperCase();
        const thn = document.getElementById('regTahun').value;
        const kls = document.getElementById('regNamaKelas').value;
        const rmt = document.getElementById('regRMT').checked;
        if(uid && nama && thn && kls) {
            db.ref('pelajar/' + uid).update({ nama, tahun: thn, namaKelas: kls, rmt }).then(() => kembali());
        } else { alert("Lengkapkan maklumat!"); }
    }

    function bukaEdit(uid) {
        const m = databaseMurid.find(x => x.uid === uid);
        document.querySelectorAll('#menuUtama, #senaraiView').forEach(v => v.style.display = 'none');
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('regUid').value = m.uid;
        document.getElementById('regNama').value = m.nama;
        document.getElementById('regTahun').value = m.tahun || "";
        document.getElementById('regNamaKelas').value = m.namaKelas || "";
        document.getElementById('regRMT').checked = m.rmt || false;
    }

    function bukaKehadiran() {
        viewMode = "semua";
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('kehadiranView').style.display = 'block';
        document.getElementById('filterHadirContainer').style.display = 'block';
        document.getElementById('tarikhHadir').valueAsDate = new Date();
        prosesKehadiran();
    }

    function bukaRMT() {
        viewMode = "rmt";
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('kehadiranView').style.display = 'block';
        document.getElementById('filterHadirContainer').style.display = 'none';
        document.getElementById('tarikhHadir').valueAsDate = new Date();
        prosesKehadiran();
    }

    function bukaPendaftaran() {
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('regUid').value = ""; document.getElementById('regNama').value = "";
    }

    function kembali() {
        document.querySelectorAll('#senaraiView, #daftarView, #kehadiranView').forEach(v => v.style.display = 'none');
        document.getElementById('menuUtama').style.display = 'block';
        document.getElementById('cariUtama').value = "";
    }

    function tutupPopup() {
        document.getElementById('nfcPopup').style.display = 'none';
        document.getElementById('overlay').style.display = 'none';
    }
</script>
</body>
</html>
