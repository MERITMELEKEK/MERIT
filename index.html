<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit & RMT SK Melekek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; --rmt: #ff9f43; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 15px; }
        
        /* Grid Menu Utama */
        .grid-folder { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-folder { 
            background: white; border: 2.5px solid var(--primary); color: var(--primary); 
            padding: 15px 5px; border-radius: 15px; font-weight: 700; text-align: center; 
            box-shadow: 0 3px 6px rgba(0,0,0,0.05); cursor: pointer; font-size: 0.85rem;
        }
        .btn-khas { grid-column: span 2; padding: 15px; border-radius: 15px; font-weight: 800; border: none; color: white; margin-top: 5px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .tahun-label { grid-column: span 2; font-size: 0.8rem; font-weight: 700; color: #777; margin-top: 10px; }

        /* View Transitions */
        #senaraiView, #daftarView, #kehadiranView { display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .nav-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: white; padding: 12px; border-radius: 12px; }
        .btn-back { background: var(--dark); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Kad Murid */
        .murid-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1.5px solid #eee; position: relative; }
        .markah-badge { background: var(--dark); color: white; padding: 5px 12px; border-radius: 8px; font-weight: 700; }
        .btn-aksi { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 700; flex: 1; cursor: pointer; }
        .rmt-tag { background: var(--rmt); color: white; padding: 2px 6px; border-radius: 4px; font-size: 0.6rem; margin-left: 5px; }

        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
        .check-group { display: flex; align-items: center; gap: 10px; background: #fff5e6; padding: 12px; border-radius: 10px; border: 1px solid var(--rmt); margin-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 12px; overflow: hidden; }
        th { background: #f1f3f9; color: #555; padding: 12px; text-align: left; font-size: 0.7rem; }
        td { padding: 10px 12px; border-bottom: 1px solid #f8f9fa; font-size: 0.8rem; }
        .status-hadir { color: var(--success); font-weight: 800; }
        .status-tidak { color: var(--danger); font-weight: 600; opacity: 0.6; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">SK MELEKEK</h2>
    <small>Merit, Kehadiran & RMT (NFC Support)</small>
</div>

<div id="menuUtama">
    <button id="btnNFC" class="btn-khas" style="background: var(--dark); margin-bottom: 20px;" onclick="mulaScanNFC()">
        📡 IMBAS KAD (NFC TELEFON)
    </button>

    <div style="margin-bottom: 15px;">
        <input type="text" id="cariUtama" placeholder="🔍 Cari nama murid..." oninput="carianGlobal()">
    </div>
    
    <div class="grid-folder">
        <div class="tahun-label">TAHUN 1</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'DELIMA')">1 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'ZAMRUD')">1 ZAMRUD</div>

        <div class="tahun-label">TAHUN 2</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'DELIMA')">2 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'ZAMRUD')">2 ZAMRUD</div>

        <div class="tahun-label">TAHUN 3</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'DELIMA')">3 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'ZAMRUD')">3 ZAMRUD</div>

        <div class="tahun-label">TAHUN 4</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'DELIMA')">4 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'ZAMRUD')">4 ZAMRUD</div>

        <div class="tahun-label">TAHUN 5</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'DELIMA')">5 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'ZAMRUD')">5 ZAMRUD</div>

        <div class="tahun-label">TAHUN 6</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'DELIMA')">6 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'ZAMRUD')">6 ZAMRUD</div>
        
        <button class="btn-khas" style="background: var(--success);" onclick="bukaKehadiran()">📅 SEMAK KEHADIRAN KELAS</button>
        <button class="btn-khas" style="background: var(--rmt);" onclick="bukaRMT()">🍲 KEHADIRAN RMT (SEMUA)</button>
        <button class="btn-khas" style="background: var(--danger);" onclick="bukaPendaftaran()">➕ DAFTAR MURID BARU</button>
    </div>
</div>

<div id="senaraiView">
    <div class="nav-header">
        <button class="btn-back" onclick="kembali()">⬅️ KEMBALI</button>
        <h3 id="labelKelas" style="margin:0; color: var(--primary);"></h3>
    </div>
    <div id="muridContainer"></div>
</div>

<div id="kehadiranView">
    <div class="nav-header">
        <button class="btn-back" onclick="kembali()">⬅️ KEMBALI</button>
        <h3 id="labelKehadiran" style="margin:0;">KEHADIRAN</h3>
    </div>
    <div style="background:white; padding:15px; border-radius:15px; margin-bottom:15px; border:1px solid #eee;">
        <input type="date" id="tarikhHadir" onchange="prosesKehadiran()">
        <div id="filterKelasContainer">
            <div style="display:flex; gap:10px;">
                <select id="tahunHadir" onchange="prosesKehadiran()">
                    <option value="1">Tahun 1</option><option value="2">2</option>
                    <option value="3">3</option><option value="4">4</option>
                    <option value="5">5</option><option value="6">6</option>
                </select>
                <select id="namaKelasHadir" onchange="prosesKehadiran()">
                    <option value="DELIMA">DELIMA</option>
                    <option value="ZAMRUD">ZAMRUD</option>
                </select>
            </div>
        </div>
    </div>
    <div id="listKehadiran"></div>
</div>

<div id="daftarView">
    <div class="nav-header">
        <button class="btn-back" onclick="kembali()">⬅️ KEMBALI</button>
        <h3 id="labelBorang" style="margin:0;">BORANG MURID</h3>
    </div>
    <div style="background: white; padding: 20px; border-radius: 15px; border: 2px solid #eee;">
        <label>ID KAD:</label>
        <input type="text" id="regUid" placeholder="Scan kad..." readonly style="background: #f1f1f1;">
        <label>NAMA MURID:</label>
        <input type="text" id="regNama" placeholder="NAMA PENUH">
        <div style="display:flex; gap:10px;">
            <select id="regTahun">
                <option value="1">T1</option><option value="2">T2</option><option value="3">T3</option>
                <option value="4">T4</option><option value="5">T5</option><option value="6">T6</option>
            </select>
            <select id="regNamaKelas">
                <option value="DELIMA">DELIMA</option>
                <option value="ZAMRUD">ZAMRUD</option>
            </select>
        </div>
        <div class="check-group">
            <input type="checkbox" id="regRMT">
            <label for="regRMT" style="font-weight:700; color:var(--rmt)">MURID RMT</label>
        </div>
        <button class="btn-aksi" style="background:var(--primary); width:100%;" onclick="simpanMurid()">SIMPAN</button>
        <button id="btnPadam" style="display:none; width:100%; margin-top:15px; color:red; border:none; background:none; font-weight:bold;" onclick="padamMurid()">HAPUS REKOD</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let databaseMurid = [];
    let curTahun = "";
    let curKelas = "";
    let viewMode = "semua"; 

    // Sync Data
    db.ref('pelajar').on('value', snap => {
        const data = snap.val();
        databaseMurid = [];
        if(data) { for(let key in data) { databaseMurid.push({uid: key, ...data[key]}); } }
        if(document.getElementById('senaraiView').style.display === 'block') reRender();
    });

    // --- FUNGSI NFC ---
    async function mulaScanNFC() {
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                document.getElementById('btnNFC').innerText = "SILA SENTUH KAD...";
                
                ndef.onreading = event => {
                    const uid = event.serialNumber.replace(/:/g, "").toUpperCase();
                    window.navigator.vibrate(100);
                    prosesHasilNFC(uid);
                };
            } catch (error) { alert("NFC Ralat: " + error); }
        } else { alert("Telefon anda tidak menyokong NFC Web."); }
    }

    function prosesHasilNFC(uid) {
        const murid = databaseMurid.find(m => m.uid === uid);
        if(murid) {
            bukaEdit(uid);
        } else {
            bukaPendaftaran();
            document.getElementById('regUid').value = uid;
        }
        document.getElementById('btnNFC').innerText = "📡 IMBAS KAD (NFC TELEFON)";
    }

    // --- LOGIK UI ---
    function pilihKelas(t, k) {
        curTahun = t; curKelas = k;
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('senaraiView').style.display = 'block';
        document.getElementById('labelKelas').innerText = t + " " + k;
        reRender();
    }

    function reRender() {
        const container = document.getElementById('muridContainer');
        container.innerHTML = "";
        let filtered = databaseMurid.filter(m => m.tahun == curTahun && m.namaKelas == curKelas);
        filtered.sort((a,b) => b.markah - a.markah).forEach(m => {
            const div = document.createElement('div');
            div.className = 'murid-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div><b>${m.nama}</b> ${m.rmt ? '<span class="rmt-tag">RMT</span>' : ''}</div>
                    <div class="markah-badge">${m.markah || 0}</div>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn-aksi" style="background:var(--success)" onclick="tukarMarkah('${m.uid}', 5)">+5</button>
                    <button class="btn-aksi" style="background:var(--danger)" onclick="tukarMarkah('${m.uid}', -5)">-5</button>
                    <button class="btn-aksi" style="background:var(--dark)" onclick="bukaEdit('${m.uid}')">EDIT</button>
                </div>`;
            container.appendChild(div);
        });
    }

    async function prosesKehadiran() {
        const tarikh = document.getElementById('tarikhHadir').value;
        const container = document.getElementById('listKehadiran');
        const snap = await db.ref('kehadiran/' + tarikh).once('value');
        const senaraiHadir = snap.val() || {};

        let list = [];
        if(viewMode === "rmt") {
            list = databaseMurid.filter(m => m.rmt === true).sort((a,b) => a.tahun - b.tahun);
        } else {
            const thn = document.getElementById('tahunHadir').value;
            const kls = document.getElementById('namaKelasHadir').value;
            list = databaseMurid.filter(m => m.tahun == thn && m.namaKelas == kls).sort((a,b) => a.nama.localeCompare(b.nama));
        }

        let html = `<table><tr><th>NAMA</th><th>STATUS</th></tr>`;
        list.forEach(m => {
            const isHadir = senaraiHadir[m.uid];
            html += `<tr><td><b>${m.nama}</b><br><small>T${m.tahun} ${m.namaKelas || ''}</small></td>
                <td><span class="${isHadir ? 'status-hadir' : 'status-tidak'}">${isHadir ? 'HADIR' : 'TIADA'}</span></td></tr>`;
        });
        container.innerHTML = html + `</table>`;
    }

    function simpanMurid() {
        const uid = document.getElementById('regUid').value;
        const nama = document.getElementById('regNama').value.toUpperCase().trim();
        const thn = document.getElementById('regTahun').value;
        const kls = document.getElementById('regNamaKelas').value;
        const rmt = document.getElementById('regRMT').checked;

        if(uid && nama) {
            db.ref('pelajar/' + uid).update({ nama: nama, tahun: thn, namaKelas: kls, rmt: rmt }).then(() => {
                db.ref('temp_pendaftaran/uid_baru').remove();
                kembali();
            });
        }
    }

    function bukaEdit(uid) {
        const m = databaseMurid.find(x => x.uid === uid);
        document.querySelectorAll('#menuUtama, #senaraiView').forEach(v => v.style.display = 'none');
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('btnPadam').style.display = 'block';
        document.getElementById('labelBorang').innerText = "KEMASKINI MURID";
        document.getElementById('regUid').value = m.uid;
        document.getElementById('regNama').value = m.nama;
        document.getElementById('regTahun').value = m.tahun;
        document.getElementById('regNamaKelas').value = m.namaKelas || "DELIMA";
        document.getElementById('regRMT').checked = m.rmt || false;
    }

    function bukaPendaftaran() {
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('labelBorang').innerText = "DAFTAR MURID BARU";
        document.getElementById('btnPadam').style.display = 'none';
        document.getElementById('regUid').value = "";
        document.getElementById('regNama').value = "";
        db.ref('temp_pendaftaran/uid_baru').once('value', s => { if(s.val()) document.getElementById('regUid').value = s.val(); });
    }

    function bukaKehadiran() {
        viewMode = "semua";
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('kehadiranView').style.display = 'block';
        document.getElementById('filterKelasContainer').style.display = 'block';
        document.getElementById('tarikhHadir').valueAsDate = new Date();
        prosesKehadiran();
    }

    function bukaRMT() {
        viewMode = "rmt";
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('kehadiranView').style.display = 'block';
        document.getElementById('filterKelasContainer').style.display = 'none';
        document.getElementById('tarikhHadir').valueAsDate = new Date();
        prosesKehadiran();
    }

    function kembali() {
        document.querySelectorAll('#senaraiView, #kehadiranView, #daftarView').forEach(v => v.style.display = 'none');
        document.getElementById('menuUtama').style.display = 'block';
    }

    function tukarMarkah(uid, pts) {
        db.ref('pelajar/' + uid + '/markah').transaction(cur => (cur || 0) + pts);
    }

    function carianGlobal() {
        const keyword = document.getElementById('cariUtama').value.toLowerCase();
        if(keyword.length > 0) {
            document.getElementById('menuUtama').style.display = 'none';
            document.getElementById('senaraiView').style.display = 'block';
            document.getElementById('labelKelas').innerText = "HASIL CARIAN";
            const res = databaseMurid.filter(m => m.nama.toLowerCase().includes(keyword));
            const container = document.getElementById('muridContainer');
            container.innerHTML = "";
            res.forEach(m => {
                const div = document.createElement('div');
                div.className = 'murid-item';
                div.innerHTML = `<b>${m.nama}</b><br><small>T${m.tahun} ${m.namaKelas}</small><br><button onclick="bukaEdit('${m.uid}')">EDIT</button>`;
                container.appendChild(div);
            });
        } else if(keyword.length === 0) { kembali(); }
    }
</script>
</body>
</html>
