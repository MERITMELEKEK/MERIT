<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit & RMT SK Melekek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; --rmt: #ff9f43; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; }
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 15px; }
        
        /* Grid Menu */
        .grid-folder { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px; }
        .btn-folder { background: white; border: 2.5px solid var(--primary); color: var(--primary); padding: 15px 5px; border-radius: 15px; font-weight: 700; text-align: center; cursor: pointer; font-size: 0.85rem; }
        .btn-khas { grid-column: span 2; padding: 15px; border-radius: 15px; font-weight: 800; border: none; color: white; margin-top: 5px; cursor: pointer; }
        .tahun-label { grid-column: span 2; font-size: 0.8rem; font-weight: 700; color: #777; margin-top: 10px; }

        /* View Layouts */
        #senaraiView, #daftarView, #kehadiranView { display: none; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-header { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; background: white; padding: 12px; border-radius: 12px; }
        .btn-back { background: var(--dark); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        /* Kad Murid */
        .murid-item { background: white; padding: 15px; border-radius: 15px; margin-bottom: 12px; border: 1.5px solid #eee; position: relative; }
        .markah-badge { background: var(--dark); color: white; padding: 5px 12px; border-radius: 8px; font-weight: 700; }
        .btn-edit-kecil { background: #f0f2f5; color: var(--primary); border: none; padding: 5px 10px; border-radius: 5px; font-size: 0.7rem; font-weight: 700; cursor: pointer; margin-top: 5px; }
        .btn-aksi { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 700; flex: 1; cursor: pointer; }

        input, select { width: 100%; padding: 12px; margin-bottom: 12px; border: 2px solid #ddd; border-radius: 10px; font-family: inherit; box-sizing: border-box; }
        .check-group { display: flex; align-items: center; gap: 10px; background: #fff5e6; padding: 12px; border-radius: 10px; border: 1px solid var(--rmt); margin-bottom: 15px; }
        .check-group input { width: auto; margin: 0; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">SK MELEKEK</h2>
    <small>Sistem Pengurusan Murid (Merit & RMT)</small>
</div>

<div id="menuUtama">
    <div class="grid-folder">
        <div class="tahun-label">PENGURUSAN TAHUN 1 - 6</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'DELIMA')">1 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('1', 'ZAMRUD')">1 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'DELIMA')">2 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('2', 'ZAMRUD')">2 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'DELIMA')">3 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('3', 'ZAMRUD')">3 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'DELIMA')">4 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('4', 'ZAMRUD')">4 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'DELIMA')">5 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('5', 'ZAMRUD')">5 ZAMRUD</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'DELIMA')">6 DELIMA</div>
        <div class="btn-folder" onclick="pilihKelas('6', 'ZAMRUD')">6 ZAMRUD</div>
        
        <button class="btn-khas" style="background: var(--success);" onclick="bukaKehadiran()">📅 SEMAK KEHADIRAN</button>
        <button class="btn-khas" style="background: var(--rmt);" onclick="bukaRMT()">🍲 PANTU MURID RMT</button>
        <button class="btn-khas" style="background: var(--danger);" onclick="bukaPendaftaran()">➕ DAFTAR MURID BARU</button>
    </div>
</div>

<div id="senaraiView">
    <div class="nav-header">
        <button class="btn-back" onclick="kembali()">⬅️ KEMBALI</button>
        <h3 id="labelKelas" style="margin:0; color: var(--primary);"></h3>
    </div>
    <div id="muridContainer"></div>
</div>

<div id="daftarView">
    <div class="nav-header">
        <button class="btn-back" onclick="kembali()">⬅️ KEMBALI</button>
        <h3 id="labelBorang" style="margin:0;">BORANG MURID</h3>
    </div>
    <div style="background: white; padding: 20px; border-radius: 15px; border: 2px solid #eee;">
        <label>ID Kad:</label>
        <input type="text" id="regUid" placeholder="Sila scan kad..." readonly style="background: #f1f1f1;">
        
        <label>Nama Murid:</label>
        <input type="text" id="regNama" placeholder="NAMA PENUH">
        
        <div style="display:flex; gap:10px;">
            <div style="flex:1">
                <label>Tahun:</label>
                <select id="regTahun">
                    <option value="1">1</option><option value="2">2</option>
                    <option value="3">3</option><option value="4">4</option>
                    <option value="5">5</option><option value="6">6</option>
                </select>
            </div>
            <div style="flex:1">
                <label>Kelas:</label>
                <select id="regNamaKelas">
                    <option value="DELIMA">DELIMA</option>
                    <option value="ZAMRUD">ZAMRUD</option>
                </select>
            </div>
        </div>

        <div class="check-group">
            <input type="checkbox" id="regRMT">
            <label for="regRMT" style="font-weight:700; color:var(--rmt)">MURID RMT</label>
        </div>

        <button class="btn-aksi" style="background:var(--primary); width:100%;" onclick="simpanMurid()">SIMPAN REKOD</button>
        <button id="btnPadam" style="display:none; width:100%; margin-top:15px; color:red; border:none; background:none; font-weight:bold; cursor:pointer;" onclick="padamMurid()">HAPUS MURID</button>
    </div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let databaseMurid = [];
    let curTahun = "";
    let curKelas = "";

    // Mula pantau data dari Firebase
    db.ref('pelajar').on('value', snap => {
        const data = snap.val();
        databaseMurid = [];
        if(data) {
            for(let key in data) {
                databaseMurid.push({ uid: key, ...data[key] });
            }
        }
        if(document.getElementById('senaraiView').style.display === 'block') reRender();
    });

    function pilihKelas(t, k) {
        curTahun = t; curKelas = k;
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('senaraiView').style.display = 'block';
        document.getElementById('labelKelas').innerText = "KELAS " + t + " " + k;
        reRender();
    }

    function reRender() {
        const container = document.getElementById('muridContainer');
        container.innerHTML = "";
        let filtered = databaseMurid.filter(m => m.tahun == curTahun && m.namaKelas == curKelas);
        
        if(filtered.length === 0) {
            container.innerHTML = "<p style='text-align:center; padding:20px; color:#888;'>Tiada murid dalam kelas ini.</p>";
            return;
        }

        filtered.sort((a,b) => b.markah - a.markah).forEach(m => {
            const div = document.createElement('div');
            div.className = 'murid-item';
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:start">
                    <div>
                        <b style="text-transform:uppercase">${m.nama}</b><br>
                        <small>ID: ${m.uid}</small><br>
                        <button class="btn-edit-kecil" onclick="bukaEdit('${m.uid}')">✏️ EDIT DATA</button>
                    </div>
                    <div style="text-align:right">
                        <div class="markah-badge">${m.markah || 0}</div>
                    </div>
                </div>
                <div style="display:flex; gap:10px; margin-top:10px;">
                    <button class="btn-aksi" style="background:var(--success)" onclick="tukarMarkah('${m.uid}', 5)">+5</button>
                    <button class="btn-aksi" style="background:var(--danger)" onclick="tukarMarkah('${m.uid}', -5)">-5</button>
                </div>`;
            container.appendChild(div);
        });
    }

    function bukaEdit(uid) {
        const m = databaseMurid.find(x => x.uid === uid);
        if(!m) return;
        
        document.getElementById('senaraiView').style.display = 'none';
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('labelBorang').innerText = "KEMASKINI MURID";
        document.getElementById('btnPadam').style.display = 'block';

        document.getElementById('regUid').value = m.uid;
        document.getElementById('regNama').value = m.nama;
        document.getElementById('regTahun').value = m.tahun;
        document.getElementById('regNamaKelas').value = m.namaKelas || "DELIMA";
        document.getElementById('regRMT').checked = m.rmt || false;
    }

    function simpanMurid() {
        const uid = document.getElementById('regUid').value;
        const nama = document.getElementById('regNama').value.toUpperCase().trim();
        const tahun = document.getElementById('regTahun').value;
        const namaKelas = document.getElementById('regNamaKelas').value;
        const rmt = document.getElementById('regRMT').checked;

        if(!uid || !nama) { alert("Sila isi nama murid!"); return; }

        db.ref('pelajar/' + uid).update({
            nama: nama,
            tahun: tahun,
            namaKelas: namaKelas,
            rmt: rmt,
            markah: databaseMurid.find(m => m.uid === uid)?.markah || 0
        }).then(() => {
            alert("Berjaya disimpan!");
            kembali();
        });
    }

    function bukaPendaftaran() {
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('daftarView').style.display = 'block';
        document.getElementById('labelBorang').innerText = "DAFTAR BARU";
        document.getElementById('btnPadam').style.display = 'none';
        
        // Reset form
        document.getElementById('regUid').value = "";
        document.getElementById('regNama').value = "";
        
        // Ambil ID dari kad terakhir di-scan
        db.ref('temp_pendaftaran/uid_baru').once('value', s => {
            if(s.val()) document.getElementById('regUid').value = s.val();
        });
    }

    function kembali() {
        document.getElementById('senaraiView').style.display = 'none';
        document.getElementById('daftarView').style.display = 'none';
        document.getElementById('menuUtama').style.display = 'block';
    }

    function tukarMarkah(uid, pts) {
        db.ref('pelajar/' + uid + '/markah').transaction(cur => (cur || 0) + pts);
    }

    function padamMurid() {
        if(confirm("Adakah anda pasti mahu padam rekod ini secara kekal?")) {
            const uid = document.getElementById('regUid').value;
            db.ref('pelajar/' + uid).remove().then(() => kembali());
        }
    }
</script>
</body>
</html>
