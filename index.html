<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit SK Melekek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; --nfc: #fff3cd; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; color: var(--dark); -webkit-tap-highlight-color: transparent; }
        .header { text-align: center; padding: 20px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 15px; }
        .nfc-card { background: var(--nfc); border: 1px solid #ffeeba; border-radius: 12px; padding: 15px; margin-bottom: 15px; text-align: center; }
        .tahun-card { background: white; border-radius: 12px; margin-bottom: 10px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.05); border: 1px solid #eee; }
        .tahun-header { padding: 18px; background: white; display: flex; justify-content: space-between; align-items: center; cursor: pointer; font-weight: 600; }
        .tahun-content { display: none; padding: 0 15px 15px 15px; border-top: 1px solid #f8f9fa; }
        .murid-item { padding: 15px 0; border-bottom: 1px solid #f1f1f1; }
        .markah-badge { background: var(--dark); color: white; padding: 4px 12px; border-radius: 8px; font-size: 0.85rem; font-weight: bold; transition: all 0.2s; }
        .markah-up { background: var(--success) !important; transform: scale(1.1); }
        .markah-down { background: var(--danger) !important; transform: scale(1.1); }
        .btn { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; width: 100%; }
        .btn-primary { background: var(--primary); }
        .btn-merit { background: var(--success); flex: 1; }
        .btn-demerit { background: var(--danger); flex: 1; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        #cari { position: sticky; top: 5px; z-index: 100; border: 2px solid var(--primary); background: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; padding: 25px; border-radius: 15px; width: 85%; }
    </style>
</head>
<body>

<div class="header">
    <h2 style="margin:0">SK MELEKEK</h2>
    <p style="margin:5px 0 0; font-size:0.8rem;">Mod Fokus NFC</p>
</div>

<div class="nfc-card">
    <button class="btn btn-primary" id="btnNFC" onclick="mulaNFC()">📲 AKTIFKAN NFC & GETARAN</button>
    <p id="nfcStatus" style="font-size: 0.75rem; margin-top: 8px; color: #856404;">Sila tekan butang di atas untuk mula.</p>
</div>

<div id="pendaftaranBox" class="tahun-card" style="display:none; border: 2px dashed var(--danger); padding:15px; background: #fff5f5;">
    <h4 style="margin:0; color:var(--danger)">⚠️ Kad Baru: <span id="newUid"></span></h4>
    <input type="text" id="regNama" placeholder="Nama Penuh Pelajar">
    <select id="regTahun" style="width:100%; padding:10px; border-radius:10px; margin-top:10px;"><option value="">Pilih Tahun</option><option value="1">1</option><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="5">5</option><option value="6">6</option></select>
    <button class="btn btn-primary" style="margin-top:10px" onclick="simpanMurid()">DAFTAR</button>
</div>

<input type="text" id="cari" placeholder="🔍 Cari nama murid..." oninput="resetFokus(); filterMurid()">
<div id="mainContainer"></div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let semuaMurid = [];
    let openedTahun = new Set(); 
    let nfcFokusUid = ""; // ID khusus untuk murid yang di-scan

    db.ref('pelajar').on('value', s => {
        const data = s.val();
        semuaMurid = [];
        for(let id in data) { semuaMurid.push({uid:id, ...data[id]}); }
        paparTahun();
    });

    db.ref('temp_pendaftaran/uid_baru').on('value', s => {
        const uid = s.val();
        document.getElementById('pendaftaranBox').style.display = uid ? 'block' : 'none';
        document.getElementById('newUid').innerText = uid || "";
    });

    function resetFokus() { nfcFokusUid = ""; }

    function paparTahun() {
        const container = document.getElementById('mainContainer');
        const key = document.getElementById('cari').value.toLowerCase().trim();
        container.innerHTML = "";

        for (let t = 1; t <= 6; t++) {
            let muridTahun = semuaMurid.filter(m => parseInt(m.tahun) === t);
            
            // LOGIK FOKUS NFC: Jika ada scan, tapis ikut UID tepat
            if (nfcFokusUid !== "") {
                muridTahun = muridTahun.filter(m => m.uid === nfcFokusUid);
            } else if (key !== "") {
                muridTahun = muridTahun.filter(m => m.nama.toLowerCase().includes(key));
            }

            if(muridTahun.length > 0) {
                const card = document.createElement('div');
                card.className = 'tahun-card';
                const isVisible = (nfcFokusUid !== "" || key !== "" || openedTahun.has(t)) ? "block" : "none";
                card.innerHTML = `
                    <div class="tahun-header" onclick="toggleTahun(${t})">
                        <span>📂 TAHUN ${t}</span>
                    </div>
                    <div id="content-tahun-${t}" class="tahun-content" style="display:${isVisible}">
                        ${muridTahun.map(m => binaItemMurid(m)).join('')}
                    </div>`;
                container.appendChild(card);
            }
        }
    }

    function binaItemMurid(m) {
        return `
            <div class="murid-item">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <div><b>${m.nama}</b><br><small>ID: ${m.uid}</small></div>
                    <div class="markah-badge" id="markah-${m.uid}">${m.markah} PT</div>
                </div>
                <div style="display:flex; gap:10px; margin-top:12px;">
                    <button class="btn btn-merit" onclick="updateMarkah('${m.uid}', 5)">+5</button>
                    <button class="btn btn-demerit" onclick="updateMarkah('${m.uid}', -5)">-5</button>
                </div>
            </div>`;
    }

    function toggleTahun(t) {
        const content = document.getElementById(`content-tahun-${t}`);
        content.style.display = content.style.display === "block" ? "none" : "block";
    }

    function updateMarkah(uid, val) {
        // PAKSA GETARAN: Menggunakan array pattern untuk impak lebih terasa
        if (navigator.vibrate) {
            navigator.vibrate([70, 40, 70]); 
        }
        
        const badge = document.getElementById(`markah-${uid}`);
        badge.classList.add(val > 0 ? 'markah-up' : 'markah-down');
        setTimeout(() => badge.classList.remove('markah-up', 'markah-down'), 400);
        db.ref('pelajar/'+uid+'/markah').transaction(c => (c || 0) + val);
    }

    function filterMurid() { paparTahun(); }

    async function mulaNFC() {
        const status = document.getElementById('nfcStatus');
        const btn = document.getElementById('btnNFC');
        
        // PENTING: Klik ini "bangunkan" sistem getaran Android
        if (navigator.vibrate) navigator.vibrate(100);
        
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                status.innerHTML = "✅ NFC AKTIF. Sedia scan kad.";
                btn.style.background = "#2ecc71";
                ndef.onreading = event => {
                    const uid = event.serialNumber.replace(/:/g, "").toUpperCase();
                    if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
                    
                    const murid = semuaMurid.find(m => m.uid === uid);
                    if(murid) {
                        nfcFokusUid = uid; // Fokus pada ID tepat
                        document.getElementById('cari').value = ""; // Kosongkan carian nama
                        paparTahun();
                    } else {
                        db.ref('temp_pendaftaran/uid_baru').set(uid);
                    }
                };
            } catch (e) { status.innerText = "Sila benarkan akses NFC!"; }
        } else { alert("Sila guna Chrome Android!"); }
    }

    function simpanMurid() {
        const uid = document.getElementById('newUid').innerText;
        const nama = document.getElementById('regNama').value.toUpperCase().trim();
        const tahun = document.getElementById('regTahun').value;
        if(nama && tahun) {
            db.ref('pelajar/'+uid).set({ nama, tahun, markah: 100 });
            db.ref('temp_pendaftaran/uid_baru').set("");
        }
    }
</script>
</body>
</html>
