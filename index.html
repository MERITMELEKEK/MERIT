<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sistem Merit SK Melekek</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { --primary: #4361ee; --success: #2ecc71; --danger: #ef476f; --dark: #2b2d42; --bg: #f8f9fa; }
        body { font-family: 'Poppins', sans-serif; background: var(--bg); margin: 0; padding: 10px; -webkit-tap-highlight-color: transparent; }
        
        .header { text-align: center; padding: 15px; background: linear-gradient(135deg, var(--primary), #3f37c9); color: white; border-radius: 15px; margin-bottom: 15px; }
        
        /* Menu Utama (Tahun) */
        .grid-menu { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn-tahun { background: white; border: 2px solid var(--primary); color: var(--primary); padding: 30px 10px; border-radius: 15px; font-weight: 600; font-size: 1.2rem; cursor: pointer; text-align: center; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .btn-tahun:active { background: var(--primary); color: white; }

        /* Paparan Murid */
        .view-section { display: none; }
        .nav-bar { display: flex; align-items: center; gap: 10px; margin-bottom: 15px; }
        .btn-back { background: var(--dark); color: white; border: none; padding: 10px 15px; border-radius: 8px; font-weight: 600; cursor: pointer; }

        .murid-item { background: white; padding: 15px; border-radius: 12px; margin-bottom: 10px; border: 1px solid #eee; transition: all 0.3s ease; }
        
        /* KESAN BERCAHAYA (GLOW) */
        .glow-hijau { 
            background-color: #e8fcf0 !important; 
            border: 2px solid var(--success) !important;
            box-shadow: 0 0 20px rgba(46, 204, 113, 0.6);
            transform: scale(1.02);
        }
        .glow-merah { 
            background-color: #fff5f6 !important; 
            border: 2px solid var(--danger) !important;
            box-shadow: 0 0 20px rgba(239, 71, 111, 0.6);
            transform: scale(1.02);
        }

        .btn { padding: 12px; border: none; border-radius: 10px; color: white; font-weight: 600; cursor: pointer; touch-action: manipulation; }
        .btn-merit { background: var(--success); flex: 1; }
        .btn-demerit { background: var(--danger); flex: 1; }
        
        .markah-badge { background: var(--dark); color: white; padding: 5px 12px; border-radius: 8px; font-weight: bold; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 2px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        
        .nfc-active-btn { background: #ffbe0b; color: #000; width: 100%; padding: 15px; border-radius: 15px; font-weight: bold; border: none; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="header">
    <h3 style="margin:0">SK MELEKEK</h3>
    <small>Pengurusan Merit-Demerit</small>
</div>

<div id="menuUtama">
    <button class="nfc-active-btn" onclick="mulaNFC()">📲 AKTIFKAN NFC & GETARAN</button>
    <div class="grid-menu">
        <div class="btn-tahun" onclick="bukaTahun(1)">TAHUN 1</div>
        <div class="btn-tahun" onclick="bukaTahun(2)">TAHUN 2</div>
        <div class="btn-tahun" onclick="bukaTahun(3)">TAHUN 3</div>
        <div class="btn-tahun" onclick="bukaTahun(4)">TAHUN 4</div>
        <div class="btn-tahun" onclick="bukaTahun(5)">TAHUN 5</div>
        <div class="btn-tahun" onclick="bukaTahun(6)">TAHUN 6</div>
    </div>
</div>

<div id="senaraiMuridView" class="view-section">
    <div class="nav-bar">
        <button class="btn-back" onclick="kembaliKeMenu()">⬅️ KEMBALI</button>
        <h3 id="tajukTahun" style="margin:0; color: var(--primary);"></h3>
    </div>
    <input type="text" id="cari" placeholder="🔍 Cari nama murid..." oninput="filterMurid()">
    <div id="muridContainer"></div>
</div>

<script>
    const firebaseConfig = {
        apiKey: "AIzaSyAejpV7AXCzbPKhsmSo3jSmzggjxZ8eK3o",
        authDomain: "sistem-merit-sk-melekek.firebaseapp.com",
        databaseURL: "https://sistem-merit-sk-melekek-default-rtdb.asia-southeast1.firebasedatabase.app",
        projectId: "sistem-merit-sk-melekek"
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    let semuaMurid = [];
    let tahunSemasa = null;

    db.ref('pelajar').on('value', s => {
        const data = s.val();
        semuaMurid = [];
        for(let id in data) { semuaMurid.push({uid:id, ...data[id]}); }
        if(tahunSemasa) paparMurid(tahunSemasa);
    });

    function bukaTahun(t) {
        tahunSemasa = t;
        document.getElementById('menuUtama').style.display = 'none';
        document.getElementById('senaraiMuridView').style.display = 'block';
        document.getElementById('tajukTahun').innerText = "TAHUN " + t;
        paparMurid(t);
    }

    function kembaliKeMenu() {
        tahunSemasa = null;
        document.getElementById('menuUtama').style.display = 'block';
        document.getElementById('senaraiMuridView').style.display = 'none';
        document.getElementById('cari').value = "";
    }

    function paparMurid(t, idFokus = null) {
        const container = document.getElementById('muridContainer');
        const cari = document.getElementById('cari').value.toLowerCase().trim();
        container.innerHTML = "";

        let senarai = semuaMurid.filter(m => parseInt(m.tahun) === t);
        
        if(idFokus) {
            senarai = senarai.filter(m => m.uid === idFokus);
        } else if (cari !== "") {
            senarai = senarai.filter(m => m.nama.toLowerCase().includes(cari));
        }

        senarai.forEach(m => {
            const div = document.createElement('div');
            div.className = 'murid-item';
            div.id = `item-${m.uid}`;
            div.innerHTML = `
                <div style="display:flex; justify-content:space-between; align-items:center">
                    <div><b>${m.nama}</b><br><small>${m.uid}</small></div>
                    <div class="markah-badge">${m.markah} PT</div>
                </div>
                <div style="display:flex; gap:10px; margin-top:12px;">
                    <button class="btn btn-merit" onpointerdown="kemaskini('${m.uid}', 5)">+5 MERIT</button>
                    <button class="btn btn-demerit" onpointerdown="kemaskini('${m.uid}', -5)">-5 DEMERIT</button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function kemaskini(uid, nilai) {
        if (navigator.vibrate) navigator.vibrate([70, 40, 70]);

        const el = document.getElementById(`item-${uid}`);
        const kelasGlow = nilai > 0 ? 'glow-hijau' : 'glow-merah';

        // Efek Visual Bercahaya
        el.classList.add(kelasGlow);
        
        db.ref('pelajar/'+uid+'/markah').transaction(c => (c || 0) + nilai);

        setTimeout(() => {
            el.classList.remove('glow-hijau', 'glow-merah');
        }, 800);
    }

    function filterMurid() {
        paparMurid(tahunSemasa);
    }

    async function mulaNFC() {
        if (navigator.vibrate) navigator.vibrate(100);
        if ('NDEFReader' in window) {
            try {
                const ndef = new NDEFReader();
                await ndef.scan();
                alert("NFC & Getaran diaktifkan!");
                ndef.onreading = event => {
                    const uid = event.serialNumber.replace(/:/g, "").toUpperCase();
                    const m = semuaMurid.find(x => x.uid === uid);
                    if(m) {
                        bukaTahun(parseInt(m.tahun));
                        paparMurid(parseInt(m.tahun), uid);
                    }
                };
            } catch (e) { alert("Sila benarkan akses NFC."); }
        }
    }
</script>
</body>
</html>
